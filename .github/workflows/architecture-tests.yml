name: Architecture Tests

on:
  pull_request:
    branches: [development, main]

jobs:
  architecture-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run architecture dependency rule tests
        run: python3 -m pytest tests/architecture/ -v --tb=short
