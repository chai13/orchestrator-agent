name: Lint

on:
  pull_request:
    branches: [development, main]

jobs:
  pylint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install pylint

      - name: Run pylint (errors only)
        run: python3 -m pylint src/ tests/ --disable=all --enable=E --generated-members=__dataclass_fields__
